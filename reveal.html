<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Art with Youmna — Logo Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#0c0c0e;overflow:hidden;font-family:'Inter',sans-serif;color:#f4f0e8}
  #stage{position:fixed;inset:0;overflow:hidden;background:
      radial-gradient(120% 90% at 50% 40%, #1a1a1f 0%, #0c0c0e 55%, #070708 100%)}

  /* moving spotlight */
  .spot{position:absolute;width:120vmax;height:120vmax;left:50%;top:50%;
    background:radial-gradient(circle, rgba(120,120,140,.18), transparent 45%);
    transform:translate(-50%,-50%);filter:blur(20px);animation:drift 16s ease-in-out infinite;pointer-events:none}
  @keyframes drift{0%,100%{transform:translate(-60%,-55%)}50%{transform:translate(-40%,-45%)}}

  /* film grain + vignette */
  .grain{position:absolute;inset:0;pointer-events:none;opacity:.05;mix-blend-mode:screen;
    background-image:radial-gradient(rgba(255,255,255,.7) 1px,transparent 1px);background-size:3px 3px;animation:grain .6s steps(2) infinite}
  @keyframes grain{0%{transform:translate(0,0)}50%{transform:translate(-1px,1px)}100%{transform:translate(1px,-1px)}}
  .vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 100% at 50% 50%, transparent 55%, rgba(0,0,0,.75) 100%)}

  #particles{position:absolute;inset:0;pointer-events:none}
  .p{position:absolute;border-radius:50%;background:rgba(244,240,232,.55);animation:rise linear infinite}
  @keyframes rise{0%{transform:translateY(0) scale(1);opacity:0}
    10%{opacity:.6}90%{opacity:.5}100%{transform:translateY(-110vh) scale(.6);opacity:0}}

  /* scenes */
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;transition:opacity 1.1s ease;pointer-events:none;padding:6vw}
  .scene.active{opacity:1}
  .halo{position:absolute;width:60vmin;height:60vmin;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.10), transparent 60%);filter:blur(30px);opacity:0;transition:opacity 1.2s}
  .scene.active .halo{opacity:1}

  .art-wrap{position:relative;display:inline-block}
  /* transform + opacity only — no CSS filter, so transparent PNGs stay transparent on iOS/Safari */
  .art{display:block;opacity:0;transform:scale(.86) translateY(24px)}
  .scene.active .art{animation:reveal 1.5s cubic-bezier(.18,.9,.24,1) forwards}
  @keyframes reveal{
    0%{opacity:0;transform:scale(.86) translateY(24px)}
    100%{opacity:1;transform:scale(1) translateY(0)}}

  /* light sweep */
  .art-wrap::after{content:'';position:absolute;top:-10%;left:-30%;width:35%;height:120%;
    background:linear-gradient(105deg, transparent, rgba(255,255,255,.55), transparent);
    transform:skewX(-18deg);opacity:0}
  .scene.active .art-wrap::after{animation:sweep 1.7s ease .5s forwards}
  @keyframes sweep{0%{left:-35%;opacity:0}18%{opacity:.9}55%{opacity:.9}100%{left:125%;opacity:0}}

  #emblem .art{width:min(60vmin,440px)}
  #primary .art{width:min(78vmin,620px)}
  #horiz  .art{width:min(90vw,880px)}

  .kicker{font-size:clamp(.7rem,1.6vw,.95rem);letter-spacing:.5em;text-transform:uppercase;color:#9a938a;
    opacity:0;transform:translateY(10px)}
  .scene.active .kicker{animation:fadeUp 1.2s ease .3s forwards}
  .caption{margin-top:2.4rem;font-size:clamp(.7rem,1.5vw,.9rem);letter-spacing:.35em;text-transform:uppercase;color:#8f887e;
    opacity:0}
  .scene.active .caption{animation:fadeUp 1.2s ease 1.1s forwards}
  @keyframes fadeUp{to{opacity:1;transform:none}}

  /* intro scene */
  #intro .line{width:0;height:1px;background:linear-gradient(90deg,transparent,#f4f0e8,transparent);
    transition:width 1.3s ease}
  #intro.active .line{width:min(70vw,520px)}
  #intro .k1{margin-bottom:1.8rem}
  #intro .k2{margin-top:1.8rem}

  /* end scene */
  #end .art{width:min(34vmin,240px)}
  #end .handle{margin-top:2rem;font-family:'Fraunces',serif;font-style:italic;font-size:clamp(1.3rem,3.4vw,2.2rem);
    opacity:0}
  #end.active .handle{animation:fadeUp 1.2s ease .8s forwards}
  #end .made{margin-top:.8rem;font-size:.75rem;letter-spacing:.35em;text-transform:uppercase;color:#8f887e;opacity:0}
  #end.active .made{animation:fadeUp 1.2s ease 1.3s forwards}

  /* controls */
  .controls{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:20;
    opacity:0;transition:opacity .6s}
  .controls.show{opacity:1}
  .ctl{background:rgba(244,240,232,.06);border:1px solid rgba(244,240,232,.25);color:#f4f0e8;
    font-family:'Inter',sans-serif;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
    padding:.6rem 1.2rem;border-radius:2px;cursor:pointer;backdrop-filter:blur(6px);transition:all .2s}
  .ctl:hover{background:rgba(244,240,232,.14)}
  .progress{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(244,240,232,.22);transition:all .4s}
  .dot.on{background:#f4f0e8;transform:scale(1.3)}
  .hint{position:fixed;bottom:22px;right:24px;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
    color:#6f6a63;z-index:20}
</style>
</head>

  let timers=[];

  function clearTimers(){timers.forEach(t=>clearTimeout(t));timers=[];}
  function show(i){
    scenes.forEach((id,k)=>document.getElementById(id).classList.toggle('active',k===i));
    dots.forEach((d,k)=>d.classList.toggle('on',k===i));
  }
  function play(){
    clearTimers(); controls.classList.remove('show');
    let t=0;
    scenes.forEach((id,i)=>{
      timers.push(setTimeout(()=>show(i), t));
      t+=durs[i];
    });
    timers.push(setTimeout(()=>controls.classList.add('show'), t-800));
  }
  function hardReplay(){
    scenes.forEach(id=>{const el=document.getElementById(id);el.classList.remove('active');});
    void document.body.offsetWidth;
    play();
  }
  document.getElementById('replay').addEventListener('click',e=>{e.stopPropagation();hardReplay();});
  document.getElementById('full').addEventListener('click',e=>{
    e.stopPropagation();
    const el=document.documentElement;
    if(!document.fullscreenElement){ (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
    else { document.exitFullscreen(); }
  });
  document.body.addEventListener('click',hardReplay);

  play();
</script>
</body>
</html>
